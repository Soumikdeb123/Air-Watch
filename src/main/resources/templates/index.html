<!DOCTYPE html>
<html>
<head>
    <title>CBD Air Watch</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <h1>CBD Air Watch</h1>
    <p class="subtitle">Adelaide CBD particle pollution dashboard</p>

    <div class="card">
        <label>Start date</label>
        <input type="date" id="startDate" value="2026-05-01">

        <label>End date</label>
        <input type="date" id="endDate" value="2026-05-31">

        <button onclick="loadAirQualityData()">Check air quality</button>
    </div>

    <div class="card">
        <h2>Recent PM10 and PM2.5 readings</h2>
        <canvas id="airChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/script.js"></script>

</body>
</html>
